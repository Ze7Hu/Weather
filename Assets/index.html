<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel= "stylesheet" href= "style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Neuton:ital@1&display=swap" rel="stylesheet">
  
<title>Weather Forecast</title>
</head>
<body>  

  <div class="card">
    <div class="search">
      <input type="'text" class="search-btn">
      <button><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 16 16" height="1.0em" width="1.2em" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" d="M10.442 10.442a1 1 0 011.415 0l3.85 3.85a1 1 0 01-1.414 1.415l-3.85-3.85a1 1 0 010-1.415z" clip-rule="evenodd"></path><path fill-rule="evenodd" d="M6.5 12a5.5 5.5 0 100-11 5.5 5.5 0 000 11zM13 6.5a6.5 6.5 0 11-13 0 6.5 6.5 0 0113 0z" clip-rule="evenodd"></path>
      </svg></button>
      </div>
      <div class="weather">
        <h1 class="cityName">London</h1>
        <div class="Temperature">5°C</div>
        <img src="../images/clouds.png" alt="cloudy">
        <div class="Humidity">Humidity: 5%</div>
        <div class="Wind">Wind speed: 5.7km/hr</div>
        <div class="Description">Cloudy</div>

</div>
</div>
  </div>
  </div>

<script src= "https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

<script src="https://api.openweathermap.org/data/2.5/forecast?q=London&appid=b1136f4aae466f3754122cd9e8150449"></script>

  <script src="script.js"></script>
  
</body>
</html>
